<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="htslurp logo">
  <g fill="none" stroke="#0d9488" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- glass (tumbler, open top, slight taper) -->
    <path d="M10 16 L12.5 43 L25.5 43 L28 16"/>
    <!-- straw, angled, out the top-right -->
    <line x1="20" y1="41" x2="35.5" y2="11"/>
    <!-- DNA double helix at the bottom of the glass -->
    <path d="M16 42 C21 40.5 21 38.5 16 37 C11 35.5 11 33.5 16 32"/>
    <path d="M22 42 C17 40.5 17 38.5 22 37 C27 35.5 27 33.5 22 32"/>
    <line x1="17.6" y1="39.3" x2="20.4" y2="39.3"/>
    <line x1="17.6" y1="34.7" x2="20.4" y2="34.7"/>
  </g>
  <!-- records streaming out of the straw -->
  <g fill="#0d9488">
    <rect x="33" y="8.5" width="3.6" height="3.6" rx="0.9"/>
    <rect x="37" y="5" width="3.6" height="3.6" rx="0.9"/>
    <rect x="41" y="1.5" width="3.6" height="3.6" rx="0.9"/>
  </g>
</svg>
